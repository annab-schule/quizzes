<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz-Sammlung</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: -apple-system, ‘Segoe UI’, system-ui, sans-serif;
background: #f5f0e8;
color: #1a1410;
min-height: 100vh;
}

header {
padding: 3rem 2rem 2rem;
max-width: 900px;
margin: 0 auto 3rem;
display: flex;
align-items: flex-end;
justify-content: space-between;
gap: 1rem;
border-bottom: 1.5px solid #ddd5c5;
}

h1 {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: clamp(2.2rem, 5vw, 3.2rem);
font-weight: 600;
line-height: 1.1;
letter-spacing: -0.02em;
}

h1 em { font-style: italic; font-weight: 400; }

.header-meta {
font-size: 0.85rem;
color: #6b5f52;
text-align: right;
line-height: 1.6;
}

.quiz-count {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: 2rem;
font-weight: 600;
display: block;
color: #1a1410;
}

main {
max-width: 900px;
margin: 0 auto;
padding: 0 2rem 4rem;
display: flex;
flex-direction: column;
gap: 3rem;
}

.section-header {
display: flex;
align-items: center;
gap: 1rem;
margin-bottom: 1.2rem;
}

.section-label {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: 1.4rem;
font-weight: 600;
letter-spacing: -0.01em;
}

.section-tag {
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.08em;
text-transform: uppercase;
padding: 0.25rem 0.7rem;
border-radius: 100px;
margin-left: auto;
}

.section-line { height: 1.5px; margin-bottom: 1.2rem; }

.english .section-label  { color: #2d5a3d; }
.english .section-tag    { background: #e8f0eb; color: #2d5a3d; }
.english .section-line   { background: #c5d9cb; }
.english .quiz-card::before { background: #2d5a3d; }
.english .quiz-card:hover   { border-color: #2d5a3d; }
.english .quiz-arrow        { color: #2d5a3d; }

.spanish .section-label  { color: #8b2e0f; }
.spanish .section-tag    { background: #f5e8e3; color: #8b2e0f; }
.spanish .section-line   { background: #e0c0b4; }
.spanish .quiz-card::before { background: #8b2e0f; }
.spanish .quiz-card:hover   { border-color: #8b2e0f; }
.spanish .quiz-arrow        { color: #8b2e0f; }

.misc .section-label  { color: #1e3a5f; }
.misc .section-tag    { background: #e3eaf5; color: #1e3a5f; }
.misc .section-line   { background: #b8c8df; }
.misc .quiz-card::before { background: #1e3a5f; }
.misc .quiz-card:hover   { border-color: #1e3a5f; }
.misc .quiz-arrow        { color: #1e3a5f; }

.quiz-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
gap: 1rem;
}

.quiz-card {
background: #fdfaf5;
border: 1.5px solid #ddd5c5;
border-radius: 14px;
padding: 1.3rem 1.4rem;
text-decoration: none;
color: #1a1410;
display: flex;
flex-direction: column;
gap: 0.5rem;
transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
position: relative;
overflow: hidden;
}

.quiz-card::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 3px;
}

.quiz-card:hover {
transform: translateY(-2px);
box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.quiz-title {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: 1.05rem;
font-weight: 600;
line-height: 1.3;
}

.quiz-meta {
font-size: 0.8rem;
color: #6b5f52;
}

.quiz-arrow {
margin-top: auto;
padding-top: 0.8rem;
font-size: 0.8rem;
font-weight: 500;
opacity: 0;
transform: translateX(-4px);
transition: opacity 0.15s ease, transform 0.15s ease;
}

.quiz-card:hover .quiz-arrow { opacity: 1; transform: translateX(0); }

/* Skeleton loader */
.skeleton {
background: #ece6da;
border-radius: 14px;
height: 110px;
animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50%       { opacity: 0.5; }
}

.empty-card {
background: transparent;
border: 1.5px dashed #ddd5c5;
border-radius: 14px;
padding: 1.8rem 1.4rem;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 0.4rem;
color: #6b5f52;
text-align: center;
min-height: 110px;
}

.empty-icon { font-size: 1.4rem; opacity: 0.35; }
.empty-text { font-size: 0.8rem; }

/* Error banner */
.error-banner {
background: #fff3cd;
border: 1px solid #f0c040;
border-radius: 10px;
padding: 0.8rem 1.2rem;
font-size: 0.82rem;
color: #7a5a00;
display: none;
margin-bottom: 1rem;
}

footer {
max-width: 900px;
margin: 0 auto;
padding: 1.5rem 2rem 3rem;
border-top: 1.5px solid #ddd5c5;
font-size: 0.78rem;
color: #6b5f52;
display: flex;
justify-content: space-between;
align-items: center;
}

@media (max-width: 600px) {
header { flex-direction: column; align-items: flex-start; }
.header-meta { text-align: left; }
.quiz-grid { grid-template-columns: 1fr; }
}
</style>

</head>
<body>

<header>
  <div>
    <h1>Quiz-<em>Sammlung</em></h1>
  </div>
  <div class="header-meta">
    <span class="quiz-count" id="total-count">–</span>
    Quizzes verfügbar
  </div>
</header>

<main>
  <div class="error-banner" id="error-banner">
    Quizzes konnten nicht geladen werden – bitte Seite neu laden.
  </div>

  <section class="english">
    <div class="section-header">
      <span class="section-label">Englisch</span>
      <span class="section-tag" id="count-english">...</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-english">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <section class="spanish">
    <div class="section-header">
      <span class="section-label">Spanisch</span>
      <span class="section-tag" id="count-spanish">...</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-spanish">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>

  <section class="misc">
    <div class="section-header">
      <span class="section-label">Sonstiges</span>
      <span class="section-tag" id="count-misc">...</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-misc">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  </section>
</main>

<footer>
  <span>Quiz-Sammlung</span>
  <span id="footer-date"></span>
</footer>

<script>
  // ── Konfiguration ──────────────────────────────────────────
  const GITHUB_USER = 'annab-schule';
  const GITHUB_REPO = 'quizzes';
  const SECTIONS = [
    { key: 'english', folder: 'englisch',  label: 'Englisch' },
    { key: 'spanish', folder: 'spanisch',  label: 'Spanisch' },
    { key: 'misc',    folder: 'sonstiges', label: 'Sonstiges' },
  ];
  // ──────────────────────────────────────────────────────────

  const API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;

  // Liest den <title>-Tag einer HTML-Datei aus dem Raw-Inhalt
  function extractMeta(html, filename) {
    const titleMatch = html.match(/<title[^>]*>([^<]+)<\/title>/i);
    const title = titleMatch
      ? titleMatch[1].trim()
      : filename.replace('.html', '').replace(/-/g, ' ');

    // Optionales <meta name="quiz-meta" content="..."> für Klasse/Thema
    const metaMatch = html.match(/<meta\s+name=["']quiz-meta["']\s+content=["']([^"']+)["']/i);
    const meta = metaMatch ? metaMatch[1] : '';

    return { title, meta };
  }

  async function loadSection(section) {
    const { key, folder } = section;
    const grid = document.getElementById('grid-' + key);
    const countEl = document.getElementById('count-' + key);

    try {
      const res = await fetch(`${API}/${folder}`);

      // Ordner existiert noch nicht → leer anzeigen
      if (res.status === 404) {
        renderEmpty(grid, countEl);
        return 0;
      }

      if (!res.ok) throw new Error('API error ' + res.status);

      const files = await res.json();
      const htmlFiles = files.filter(f => f.name.endsWith('.html') && f.type === 'file');

      if (htmlFiles.length === 0) {
        renderEmpty(grid, countEl);
        return 0;
      }

      // Alle Dateien parallel laden um Titel + Meta zu lesen
      const quizzes = await Promise.all(htmlFiles.map(async file => {
        try {
          const raw = await fetch(file.download_url);
          const html = await raw.text();
          const { title, meta } = extractMeta(html, file.name);
          return { title, meta, path: `${folder}/${file.name}` };
        } catch {
          return {
            title: file.name.replace('.html','').replace(/-/g,' '),
            meta: '',
            path: `${folder}/${file.name}`
          };
        }
      }));

      // Karten rendern
      grid.innerHTML = quizzes.map(q => `
        <a class="quiz-card" href="${q.path}">
          <span class="quiz-title">${q.title}</span>
          ${q.meta ? `<span class="quiz-meta">${q.meta}</span>` : ''}
          <span class="quiz-arrow">Quiz starten →</span>
        </a>
      `).join('');

      countEl.textContent = quizzes.length + (quizzes.length === 1 ? ' Quiz' : ' Quizzes');
      return quizzes.length;

    } catch (err) {
      console.error('Fehler beim Laden von', folder, err);
      renderEmpty(grid, countEl);
      return 0;
    }
  }

  function renderEmpty(grid, countEl) {
    grid.innerHTML = `
      <div class="empty-card">
        <span class="empty-icon">+</span>
        <span class="empty-text">Noch keine Quizzes</span>
      </div>`;
    countEl.textContent = '0 Quizzes';
  }

  async function init() {
    try {
      const counts = await Promise.all(SECTIONS.map(loadSection));
      const total = counts.reduce((a, b) => a + b, 0);
      document.getElementById('total-count').textContent = total;
    } catch {
      document.getElementById('error-banner').style.display = 'block';
      document.getElementById('total-count').textContent = '?';
    }

    document.getElementById('footer-date').textContent =
      'Stand: ' + new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
  }

  init();
</script>

</body>
</html>
