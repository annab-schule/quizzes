<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz-Sammlung</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: -apple-system, ‘Segoe UI’, system-ui, sans-serif;
background: #f5f0e8;
color: #1a1410;
min-height: 100vh;
}

header {
padding: 3rem 2rem 2rem;
max-width: 900px;
margin: 0 auto 3rem;
display: flex;
align-items: flex-end;
justify-content: space-between;
gap: 1rem;
border-bottom: 1.5px solid #ddd5c5;
}

h1 {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: clamp(2.2rem, 5vw, 3.2rem);
font-weight: 600;
line-height: 1.1;
letter-spacing: -0.02em;
}

h1 em {
font-style: italic;
font-weight: 400;
}

.header-meta {
font-size: 0.85rem;
color: #6b5f52;
text-align: right;
line-height: 1.6;
}

.quiz-count {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: 2rem;
font-weight: 600;
display: block;
color: #1a1410;
}

main {
max-width: 900px;
margin: 0 auto;
padding: 0 2rem 4rem;
display: flex;
flex-direction: column;
gap: 3rem;
}

.section-header {
display: flex;
align-items: center;
gap: 1rem;
margin-bottom: 1.2rem;
}

.section-label {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: 1.4rem;
font-weight: 600;
letter-spacing: -0.01em;
}

.section-tag {
font-size: 0.72rem;
font-weight: 600;
letter-spacing: 0.08em;
text-transform: uppercase;
padding: 0.25rem 0.7rem;
border-radius: 100px;
margin-left: auto;
}

.section-line {
height: 1.5px;
margin-bottom: 1.2rem;
}

.english .section-label  { color: #2d5a3d; }
.english .section-tag    { background: #e8f0eb; color: #2d5a3d; }
.english .section-line   { background: #c5d9cb; }
.english .quiz-card::before { background: #2d5a3d; }
.english .quiz-card:hover   { border-color: #2d5a3d; }
.english .quiz-arrow        { color: #2d5a3d; }

.spanish .section-label  { color: #8b2e0f; }
.spanish .section-tag    { background: #f5e8e3; color: #8b2e0f; }
.spanish .section-line   { background: #e0c0b4; }
.spanish .quiz-card::before { background: #8b2e0f; }
.spanish .quiz-card:hover   { border-color: #8b2e0f; }
.spanish .quiz-arrow        { color: #8b2e0f; }

.misc .section-label  { color: #1e3a5f; }
.misc .section-tag    { background: #e3eaf5; color: #1e3a5f; }
.misc .section-line   { background: #b8c8df; }
.misc .quiz-card::before { background: #1e3a5f; }
.misc .quiz-card:hover   { border-color: #1e3a5f; }
.misc .quiz-arrow        { color: #1e3a5f; }

.quiz-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
gap: 1rem;
}

.quiz-card {
background: #fdfaf5;
border: 1.5px solid #ddd5c5;
border-radius: 14px;
padding: 1.3rem 1.4rem;
text-decoration: none;
color: #1a1410;
display: flex;
flex-direction: column;
gap: 0.5rem;
transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
position: relative;
overflow: hidden;
}

.quiz-card::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 3px;
}

.quiz-card:hover {
transform: translateY(-2px);
box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.quiz-title {
font-family: ‘Palatino Linotype’, ‘Book Antiqua’, Palatino, Georgia, serif;
font-size: 1.05rem;
font-weight: 600;
line-height: 1.3;
}

.quiz-meta {
font-size: 0.8rem;
color: #6b5f52;
}

.quiz-arrow {
margin-top: auto;
padding-top: 0.8rem;
font-size: 0.8rem;
font-weight: 500;
opacity: 0;
transform: translateX(-4px);
transition: opacity 0.15s ease, transform 0.15s ease;
}

.quiz-card:hover .quiz-arrow {
opacity: 1;
transform: translateX(0);
}

.empty-card {
background: transparent;
border: 1.5px dashed #ddd5c5;
border-radius: 14px;
padding: 1.8rem 1.4rem;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 0.4rem;
color: #6b5f52;
text-align: center;
min-height: 110px;
}

.empty-icon { font-size: 1.4rem; opacity: 0.35; }
.empty-text { font-size: 0.8rem; }

footer {
max-width: 900px;
margin: 0 auto;
padding: 1.5rem 2rem 3rem;
border-top: 1.5px solid #ddd5c5;
font-size: 0.78rem;
color: #6b5f52;
display: flex;
justify-content: space-between;
align-items: center;
}

@media (max-width: 600px) {
header { flex-direction: column; align-items: flex-start; }
.header-meta { text-align: left; }
.quiz-grid { grid-template-columns: 1fr; }
}
</style>

</head>
<body>

<header>
  <div>
    <h1>Quiz-<em>Sammlung</em></h1>
  </div>
  <div class="header-meta">
    <span class="quiz-count" id="total-count">0</span>
    Quizzes verfügbar
  </div>
</header>

<main>

  <section class="english">
    <div class="section-header">
      <span class="section-label">Englisch</span>
      <span class="section-tag" id="count-english">0 Quizzes</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-english">
      <div class="empty-card">
        <span class="empty-icon">+</span>
        <span class="empty-text">Noch keine Quizzes</span>
      </div>
    </div>
  </section>

  <section class="spanish">
    <div class="section-header">
      <span class="section-label">Spanisch</span>
      <span class="section-tag" id="count-spanish">0 Quizzes</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-spanish">
      <div class="empty-card">
        <span class="empty-icon">+</span>
        <span class="empty-text">Noch keine Quizzes</span>
      </div>
    </div>
  </section>

  <section class="misc">
    <div class="section-header">
      <span class="section-label">Sonstiges</span>
      <span class="section-tag" id="count-misc">0 Quizzes</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-misc">
      <div class="empty-card">
        <span class="empty-icon">+</span>
        <span class="empty-text">Noch keine Quizzes</span>
      </div>
    </div>
  </section>

</main>

<footer>
  <span>Quiz-Sammlung</span>
  <span id="footer-date"></span>
</footer>

<script>
  // ─────────────────────────────────────────────────────────────
  // QUIZZES – Claude trägt neue Einträge hier ein
  // { title, meta, file, section: "english" | "spanish" | "misc" }
  // ─────────────────────────────────────────────────────────────
  const quizzes = [
    // { title: "Present Perfect", meta: "Klasse 7 · Grammatik", file: "englisch/present-perfect.html", section: "english" },
    // { title: "Animales", meta: "Klasse 6 · Vokabeln", file: "spanisch/animales.html", section: "spanish" },
    // { title: "Allgemeinwissen", meta: "Vertretungsstunde", file: "sonstiges/allgemeinwissen.html", section: "misc" },
  ];
  // ─────────────────────────────────────────────────────────────

  (function() {
    const sections = { english: [], spanish: [], misc: [] };
    quizzes.forEach(q => { if (sections[q.section]) sections[q.section].push(q); });
    let total = 0;
    for (const [key, items] of Object.entries(sections)) {
      document.getElementById('count-' + key).textContent =
        items.length + (items.length === 1 ? ' Quiz' : ' Quizzes');
      total += items.length;
      if (!items.length) continue;
      document.getElementById('grid-' + key).innerHTML = items.map(q => `
        <a class="quiz-card" href="${q.file}">
          <span class="quiz-title">${q.title}</span>
          <span class="quiz-meta">${q.meta}</span>
          <span class="quiz-arrow">Quiz starten →</span>
        </a>`).join('');
    }
    document.getElementById('total-count').textContent = total;
    document.getElementById('footer-date').textContent =
      'Stand: ' + new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
  })();
</script>

</body>
</html>
