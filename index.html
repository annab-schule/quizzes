<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz-Sammlung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #f5f0e8;
–ink: #1a1410;
–ink-muted: #6b5f52;
–english: #2d5a3d;
–english-light: #e8f0eb;
–spanish: #8b2e0f;
–spanish-light: #f5e8e3;
–misc: #1e3a5f;
–misc-light: #e3eaf5;
–card-bg: #fdfaf5;
–border: #ddd5c5;
–radius: 14px;
}

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–ink);
min-height: 100vh;
}

/* Header */
header {
padding: 3rem 2rem 2rem;
max-width: 900px;
margin: 0 auto;
display: flex;
align-items: flex-end;
justify-content: space-between;
gap: 1rem;
border-bottom: 1.5px solid var(–border);
margin-bottom: 3rem;
}

.header-left h1 {
font-family: ‘Fraunces’, serif;
font-size: clamp(2.2rem, 5vw, 3.2rem);
font-weight: 600;
line-height: 1.1;
letter-spacing: -0.02em;
}

.header-left h1 em {
font-style: italic;
font-weight: 400;
}

.header-meta {
font-size: 0.85rem;
color: var(–ink-muted);
text-align: right;
line-height: 1.6;
}

.quiz-count {
font-family: ‘Fraunces’, serif;
font-size: 2rem;
font-weight: 600;
display: block;
color: var(–ink);
}

/* Main */
main {
max-width: 900px;
margin: 0 auto;
padding: 0 2rem 4rem;
display: flex;
flex-direction: column;
gap: 3rem;
}

/* Section */
.section-header {
display: flex;
align-items: center;
gap: 1rem;
margin-bottom: 1.2rem;
}

.section-label {
font-family: ‘Fraunces’, serif;
font-size: 1.4rem;
font-weight: 600;
letter-spacing: -0.01em;
}

.section-tag {
font-size: 0.72rem;
font-weight: 500;
letter-spacing: 0.08em;
text-transform: uppercase;
padding: 0.25rem 0.7rem;
border-radius: 100px;
margin-left: auto;
}

.english .section-label { color: var(–english); }
.english .section-tag { background: var(–english-light); color: var(–english); }

.spanish .section-label { color: var(–spanish); }
.spanish .section-tag { background: var(–spanish-light); color: var(–spanish); }

.misc .section-label { color: var(–misc); }
.misc .section-tag { background: var(–misc-light); color: var(–misc); }

.section-line {
height: 1.5px;
background: var(–border);
margin-bottom: 1.2rem;
}

/* Quiz grid */
.quiz-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
gap: 1rem;
}

/* Quiz card */
.quiz-card {
background: var(–card-bg);
border: 1.5px solid var(–border);
border-radius: var(–radius);
padding: 1.3rem 1.4rem;
text-decoration: none;
color: inherit;
display: flex;
flex-direction: column;
gap: 0.5rem;
transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
position: relative;
overflow: hidden;
}

.quiz-card::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 3px;
border-radius: 3px 0 0 3px;
}

.english .quiz-card::before { background: var(–english); }
.spanish .quiz-card::before { background: var(–spanish); }
.misc .quiz-card::before { background: var(–misc); }

.quiz-card:hover {
transform: translateY(-2px);
box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.english .quiz-card:hover { border-color: var(–english); }
.spanish .quiz-card:hover { border-color: var(–spanish); }
.misc .quiz-card:hover { border-color: var(–misc); }

.quiz-title {
font-family: ‘Fraunces’, serif;
font-size: 1.05rem;
font-weight: 600;
line-height: 1.3;
}

.quiz-meta {
font-size: 0.8rem;
color: var(–ink-muted);
}

.quiz-arrow {
margin-top: auto;
padding-top: 0.8rem;
font-size: 0.8rem;
font-weight: 500;
display: flex;
align-items: center;
gap: 0.3rem;
opacity: 0;
transform: translateX(-4px);
transition: opacity 0.15s ease, transform 0.15s ease;
}

.english .quiz-arrow { color: var(–english); }
.spanish .quiz-arrow { color: var(–spanish); }
.misc .quiz-arrow { color: var(–misc); }

.quiz-card:hover .quiz-arrow {
opacity: 1;
transform: translateX(0);
}

/* Empty state */
.empty-card {
background: transparent;
border: 1.5px dashed var(–border);
border-radius: var(–radius);
padding: 1.8rem 1.4rem;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 0.4rem;
color: var(–ink-muted);
text-align: center;
min-height: 110px;
}

.empty-card span:first-child {
font-size: 1.4rem;
opacity: 0.4;
}

.empty-card span:last-child {
font-size: 0.8rem;
}

/* Footer */
footer {
max-width: 900px;
margin: 0 auto;
padding: 1.5rem 2rem 3rem;
border-top: 1.5px solid var(–border);
font-size: 0.78rem;
color: var(–ink-muted);
display: flex;
justify-content: space-between;
align-items: center;
}

@media (max-width: 600px) {
header { flex-direction: column; align-items: flex-start; }
.header-meta { text-align: left; }
.quiz-grid { grid-template-columns: 1fr; }
}
</style>

</head>
<body>

<header>
  <div class="header-left">
    <h1>Quiz-<em>Sammlung</em></h1>
  </div>
  <div class="header-meta">
    <span class="quiz-count" id="total-count">0</span>
    Quizzes verfügbar
  </div>
</header>

<main>

  <!-- ENGLISCH -->

  <section class="english">
    <div class="section-header">
      <span class="section-label">Englisch</span>
      <span class="section-tag" id="count-english">0 Quizzes</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-english">
      <!-- Quizzes werden hier eingefügt -->
      <div class="empty-card">
        <span>＋</span>
        <span>Noch keine Quizzes</span>
      </div>
    </div>
  </section>

  <!-- SPANISCH -->

  <section class="spanish">
    <div class="section-header">
      <span class="section-label">Spanisch</span>
      <span class="section-tag" id="count-spanish">0 Quizzes</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-spanish">
      <div class="empty-card">
        <span>＋</span>
        <span>Noch keine Quizzes</span>
      </div>
    </div>
  </section>

  <!-- SONSTIGES -->

  <section class="misc">
    <div class="section-header">
      <span class="section-label">Sonstiges</span>
      <span class="section-tag" id="count-misc">0 Quizzes</span>
    </div>
    <div class="section-line"></div>
    <div class="quiz-grid" id="grid-misc">
      <div class="empty-card">
        <span>＋</span>
        <span>Noch keine Quizzes</span>
      </div>
    </div>
  </section>

</main>

<footer>
  <span>Quiz-Sammlung</span>
  <span id="footer-date"></span>
</footer>

<script>
  // ─────────────────────────────────────────────
  // QUIZZES HIER EINTRAGEN
  // Format pro Eintrag:
  // { title: "Titel", meta: "Klasse / Thema", file: "dateiname.html", section: "english" }
  // section: "english" | "spanish" | "misc"
  // ─────────────────────────────────────────────
  const quizzes = [
    // Beispiele (auskommentiert) – Claude trägt neue Einträge hier ein:
    // { title: "Present Perfect", meta: "Klasse 7 · Grammatik", file: "englisch/present-perfect.html", section: "english" },
    // { title: "Animales", meta: "Klasse 6 · Vokabeln", file: "spanisch/animales.html", section: "spanish" },
    // { title: "Allgemeinwissen", meta: "Vertretungsstunde", file: "sonstiges/allgemeinwissen.html", section: "misc" },
  ];
  // ─────────────────────────────────────────────

  function buildGrid() {
    const sections = { english: [], spanish: [], misc: [] };
    quizzes.forEach(q => { if (sections[q.section]) sections[q.section].push(q); });

    let total = 0;

    for (const [key, items] of Object.entries(sections)) {
      const grid = document.getElementById('grid-' + key);
      const countEl = document.getElementById('count-' + key);
      countEl.textContent = items.length + (items.length === 1 ? ' Quiz' : ' Quizzes');
      total += items.length;

      if (items.length === 0) continue;

      grid.innerHTML = items.map(q => `
        <a class="quiz-card" href="${q.file}">
          <span class="quiz-title">${q.title}</span>
          <span class="quiz-meta">${q.meta}</span>
          <span class="quiz-arrow">Quiz starten →</span>
        </a>
      `).join('');
    }

    document.getElementById('total-count').textContent = total;
  }

  buildGrid();
  document.getElementById('footer-date').textContent = 'Stand: ' + new Date().toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
</script>

</body>
</html>
