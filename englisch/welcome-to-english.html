<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="quiz-meta" content="Klasse 5–6 · Willkommen im Englischunterricht – Fun Facts & Popkultur">
  <title>🌍 Welcome to English! – Quiz</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: #f0f4ff;
  color: #1e293b;
  min-height: 100vh;
  padding: 0 0 60px;
}

.header {
  background: linear-gradient(135deg, #2d5a9e 0%, #1a3a6e 100%);
  color: #ffffff;
  padding: 28px 24px 20px;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '🌍';
  position: absolute;
  right: 80px;
  top: 10px;
  font-size: 72px;
  opacity: 0.15;
}
.header h1 {
  font-family: Palatino, Georgia, serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  line-height: 1.2;
  color: #ffffff;
}
.header p {
  font-size: 0.9rem;
  opacity: 0.85;
  margin-top: 4px;
  color: #ffffff;
}
.progress-wrap {
  background: rgba(255,255,255,0.2);
  border-radius: 99px;
  height: 8px;
  margin-top: 16px;
  overflow: hidden;
}
.progress-bar {
  background: #f59e0b;
  height: 100%;
  border-radius: 99px;
  transition: width 0.5s ease;
  width: 0%;
}
.progress-label {
  font-size: 0.78rem;
  opacity: 0.8;
  margin-top: 6px;
  color: #ffffff;
}
.qr-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.18);
  border: 2px solid rgba(255,255,255,0.4);
  color: #ffffff;
  border-radius: 10px;
  padding: 6px 10px;
  font-size: 1.2rem;
  cursor: pointer;
  transition: background 0.2s;
}
.qr-btn:hover { background: rgba(255,255,255,0.3); }

.qr-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 999;
  align-items: center;
  justify-content: center;
}
.qr-modal.open { display: flex; }
.qr-box {
  background: #ffffff;
  border-radius: 16px;
  padding: 28px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.qr-box h3 {
  font-family: Palatino, Georgia, serif;
  margin-bottom: 12px;
  color: #2d5a9e;
}
.qr-box p { font-size: 0.85rem; color: #64748b; margin-top: 12px; }
.qr-close {
  margin-top: 16px;
  background: #2d5a9e;
  color: #ffffff;
  border: none;
  border-radius: 8px;
  padding: 8px 24px;
  cursor: pointer;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 0.9rem;
}

main {
  max-width: 680px;
  margin: 32px auto 0;
  padding: 0 16px;
}

.question-card {
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(45,90,158,0.10);
  padding: 28px 28px 24px;
  animation: fadeUp 0.35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.q-number {
  background: #2d5a9e;
  color: #ffffff;
  border-radius: 8px;
  padding: 3px 10px;
  font-weight: 700;
  font-size: 0.82rem;
}
.q-category {
  background: #eef2ff;
  color: #2d5a9e;
  border-radius: 8px;
  padding: 3px 10px;
  font-size: 0.82rem;
  font-weight: 600;
}
.q-emoji {
  font-size: 2.6rem;
  margin-bottom: 10px;
  display: block;
}
.q-text {
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 20px;
  color: #1e293b;
}

.answers { display: grid; gap: 10px; }
.answer-btn {
  background: #f8faff;
  border: 2px solid #dde4f5;
  border-radius: 12px;
  padding: 13px 18px;
  text-align: left;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 1rem;
  font-weight: 600;
  color: #1e293b;
  cursor: pointer;
  transition: all 0.18s ease;
  display: flex;
  align-items: center;
  gap: 12px;
}
.answer-btn:hover:not(:disabled) {
  background: #eef2ff;
  border-color: #2d5a9e;
  transform: translateX(4px);
}
.answer-btn .letter {
  min-width: 30px;
  height: 30px;
  background: #2d5a9e;
  color: #ffffff;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 900;
  flex-shrink: 0;
}
.answer-btn.correct { background: #ecfdf5; border-color: #10b981; color: #065f46; }
.answer-btn.correct .letter { background: #10b981; }
.answer-btn.wrong { background: #fef2f2; border-color: #ef4444; color: #7f1d1d; }
.answer-btn.wrong .letter { background: #ef4444; }
.answer-btn:disabled { cursor: default; }

.feedback {
  display: none;
  margin-top: 16px;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 0.93rem;
  line-height: 1.5;
  animation: fadeUp 0.25s ease both;
}
.feedback.correct-fb {
  display: block;
  background: #ecfdf5;
  border-left: 4px solid #10b981;
  color: #065f46;
}
.feedback.wrong-fb {
  display: block;
  background: #fff7ed;
  border-left: 4px solid #f59e0b;
  color: #92400e;
}

.next-btn {
  display: none;
  margin-top: 18px;
  width: 100%;
  background: #2d5a9e;
  color: #ffffff;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.next-btn:hover { background: #1a3a6e; transform: translateY(-2px); }
.next-btn.visible { display: block; }

.score-screen {
  display: none;
  background: #ffffff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(45,90,158,0.10);
  padding: 36px 28px;
  text-align: center;
  animation: fadeUp 0.4s ease both;
}
.score-screen.visible { display: block; }
.score-emoji { font-size: 4rem; margin-bottom: 12px; }
.score-title {
  font-family: Palatino, Georgia, serif;
  font-size: 1.7rem;
  color: #2d5a9e;
  margin-bottom: 8px;
}
.score-sub { color: #64748b; font-size: 0.95rem; margin-bottom: 24px; }
.score-number { font-size: 3.5rem; font-weight: 900; color: #2d5a9e; line-height: 1; }
.score-of { font-size: 1.1rem; color: #64748b; margin-bottom: 24px; }
.score-msg {
  background: #eef2ff;
  border-radius: 12px;
  padding: 16px 20px;
  font-size: 1rem;
  font-weight: 600;
  color: #2d5a9e;
  margin-bottom: 28px;
  line-height: 1.5;
}
.stars { font-size: 2rem; margin-bottom: 16px; }
.again-btn {
  background: #f59e0b;
  color: #ffffff;
  border: none;
  border-radius: 12px;
  padding: 14px 32px;
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s;
}
.again-btn:hover { transform: scale(1.04); }

.back-link {
  display: block;
  text-align: center;
  margin-top: 24px;
  color: #2d5a9e;
  font-weight: 600;
  font-size: 0.9rem;
  text-decoration: none;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.back-link:hover { opacity: 1; }

  </style>
</head>
<body>

<div class="header">
  <button class="qr-btn" onclick="openQR()" title="QR-Code anzeigen">⊞</button>
  <h1>🌍 Welcome to English!</h1>
  <p>Klasse 5–6 · Fun Facts & Popkultur · 12 Fragen</p>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="progress-label" id="progressLabel">Frage 1 von 12</div>
</div>

<div class="qr-modal" id="qrModal" onclick="closeQR(event)">
  <div class="qr-box">
    <h3>📱 Quiz teilen</h3>
    <div id="qrcode"></div>
    <p>Scanne den Code mit dem Handy!</p>
    <button class="qr-close" onclick="closeQR()">Schließen</button>
  </div>
</div>

<main>
  <div class="question-card" id="questionCard">
    <div class="q-meta">
      <span class="q-number" id="qNumber">1 / 12</span>
      <span class="q-category" id="qCategory">Fun Facts</span>
    </div>
    <span class="q-emoji" id="qEmoji">🎉</span>
    <div class="q-text" id="qText">Laden…</div>
    <div class="answers" id="answersContainer"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Weiter →</button>
  </div>

  <div class="score-screen" id="scoreScreen">
    <div class="score-emoji" id="scoreEmoji">🏆</div>
    <div class="score-title" id="scoreTitle">Well done!</div>
    <div class="score-sub">Du hast das Quiz beendet!</div>
    <div class="score-number" id="scoreNumber">0</div>
    <div class="score-of" id="scoreOf">von 12 Punkten</div>
    <div class="stars" id="scoreStars">⭐⭐⭐</div>
    <div class="score-msg" id="scoreMsg">Super gemacht!</div>
    <button class="again-btn" onclick="restartQuiz()">🔄 Nochmal spielen</button>
  </div>

</main>

<script>
var questions = [
  {
    emoji: "🇬🇧",
    category: "Fun Fact",
    text: "Wie viele Menschen auf der Welt sprechen Englisch als erste ODER zweite Sprache?",
    answers: ["Etwa 500 Millionen", "Etwa 1 Milliarde", "Etwa 1,5 Milliarden", "Etwa 3 Milliarden"],
    correct: 2,
    feedback: {
      right: "✅ Genau! Rund 1,5 Milliarden Menschen sprechen Englisch – das ist fast jeder fünfte Mensch auf der Erde. Englisch zu lernen lohnt sich wirklich!",
      wrong: "💡 Es sind etwa 1,5 Milliarden Menschen! Das ist fast jeder fünfte Mensch weltweit. Deshalb ist Englisch so wichtig."
    }
  },
  {
    emoji: "🦁",
    category: "Fun Fact",
    text: "Welches Tier ist das Nationalsymbol Englands?",
    answers: ["Der Adler", "Der Löwe", "Der Drache", "Das Einhorn"],
    correct: 1,
    feedback: {
      right: "✅ Super! The lion – der Löwe – steht auf der englischen Flagge. Übrigens: Das Einhorn (unicorn) ist das Symboltier Schottlands! 🦁",
      wrong: "💡 Es ist der Löwe – the lion! Und das Einhorn (unicorn) ist das Symboltier Schottlands. Wusstest du das?"
    }
  },
  {
    emoji: "🎵",
    category: "Popkultur",
    text: "Die Beatles sind eine der berühmtesten Bands der Welt – und kamen aus England. Aus welcher Stadt?",
    answers: ["London", "Manchester", "Liverpool", "Birmingham"],
    correct: 2,
    feedback: {
      right: "✅ Yes! The Beatles came from Liverpool! Songs wie \"Let It Be\" und \"Hey Jude\" kennt die ganze Welt. 🎶",
      wrong: "💡 The Beatles came from Liverpool! Die Stadt im Nordwesten Englands ist heute ein Pilgerziel für Musikfans aus aller Welt."
    }
  },
  {
    emoji: "🧙",
    category: "Popkultur",
    text: "Wie lautet der offizielle englische Name von Harry Potters Schule Hogwarts?",
    answers: ["School of Rock", "School of Magic", "Hogwarts School of Witchcraft and Wizardry", "School of Spells and Dragons"],
    correct: 2,
    feedback: {
      right: "✅ Richtig! Witchcraft = Hexerei, Wizardry = Zauberei. Du lernst heute schon zwei neue Englischwörter! 🧙",
      wrong: "💡 Der offizielle Name ist: Hogwarts School of Witchcraft and Wizardry. Witchcraft = Hexerei, Wizardry = Zauberei – merken!"
    }
  },
  {
    emoji: "🌦️",
    category: "Fun Fact",
    text: "Wofür ist das Wetter in Großbritannien besonders bekannt?",
    answers: ["Sehr viel Sonne und Hitze", "Häufigen Regen und Bewölkung", "Schneestürme im Sommer", "Tropische Temperaturen"],
    correct: 1,
    feedback: {
      right: "✅ Genau! The British weather is famously rainy! Daher reden Briten immer über das Wetter – \"Lovely weather, isn't it?\" ist typischer Smalltalk! ☂️",
      wrong: "💡 Großbritannien ist berühmt für Regen! Deshalb ist \"How's the weather?\" in England fast eine Kunstform des Gesprächs."
    }
  },
  {
    emoji: "🦸",
    category: "Popkultur",
    text: "\"With great power comes great responsibility\" – von welchem Superhelden stammt dieses Zitat?",
    answers: ["Batman", "Iron Man", "Spider-Man", "Superman"],
    correct: 2,
    feedback: {
      right: "✅ Perfekt! Spider-Man! Power = Macht, responsibility = Verantwortung. Mit großer Macht kommt große Verantwortung. 🕷️",
      wrong: "💡 Das Zitat gehört Spider-Man! Power = Macht, responsibility = Verantwortung – zwei super wichtige Englischwörter!"
    }
  },
  {
    emoji: "🎄",
    category: "Fun Fact",
    text: "Wie sagt man \"Frohe Weihnachten\" auf Englisch?",
    answers: ["Happy Christmas Day", "Merry Christmas", "Good Christmas", "Happy X-Day"],
    correct: 1,
    feedback: {
      right: "✅ Yes! \"Merry Christmas!\" Merry bedeutet fröhlich – das Wort wird fast nur zu Weihnachten benutzt. 🎅",
      wrong: "💡 \"Merry Christmas!\" ist richtig. Merry ist ein altmodisches Wort für fröhlich – es wird fast nur zu Weihnachten benutzt!"
    }
  },
  {
    emoji: "🍟",
    category: "Fun Fact",
    text: "Was ist das berühmteste Nationalgericht Großbritanniens?",
    answers: ["Fish and Chips", "Pizza and Pasta", "Sushi and Rice", "Tacos and Nachos"],
    correct: 0,
    feedback: {
      right: "✅ Richtig! Fish and Chips – Fisch im Teigmantel mit Pommes. In England gibt es extra Läden dafür: Chip Shops! 🐟",
      wrong: "💡 Fish and Chips! Fisch im Teigmantel mit Pommes – in England gibt es dafür eigene Läden namens Chip Shops."
    }
  },
  {
    emoji: "🦁👑",
    category: "Popkultur",
    text: "In \"The Lion King\" gibt es ein weltberühmtes Lied von Simba und seinen Freunden. Wie heißt es?",
    answers: ["Can You Hear Me Roar", "Hakuna Matata", "Pride Rock Song", "Africa Forever"],
    correct: 1,
    feedback: {
      right: "✅ Hakuna Matata! Das Wort kommt aus dem Swahili und bedeutet keine Sorgen. Auf Englisch: \"It means no worries!\" 🌈",
      wrong: "💡 \"Hakuna Matata\"! Es kommt aus dem Swahili und bedeutet keine Sorgen. Im Film: \"It means no worries for the rest of your days!\""
    }
  },
  {
    emoji: "🗺️",
    category: "Fun Fact",
    text: "In wie vielen Ländern ist Englisch die offizielle Amtssprache?",
    answers: ["In etwa 10 Ländern", "In etwa 25 Ländern", "In mehr als 50 Ländern", "In nur 5 Ländern"],
    correct: 2,
    feedback: {
      right: "✅ Wow, genau! Über 50 Länder – USA, Australien, Kanada, Nigeria, Indien… English is truly a world language! 🌍",
      wrong: "💡 Mehr als 50 Länder! USA, Australien, Kanada, Nigeria, Indien... English is truly a world language!"
    }
  },
  {
    emoji: "🎮",
    category: "Popkultur",
    text: "\"Game Over\" kennst du sicher aus Videospielen. Was bedeutet es auf Deutsch?",
    answers: ["Spiel läuft noch", "Spiel pausiert", "Spiel ist vorbei", "Spiel startet neu"],
    correct: 2,
    feedback: {
      right: "✅ Richtig! Game = Spiel, over = vorbei. Du benutzt schon Englisch beim Zocken – ohne es zu wissen! 🎮",
      wrong: "💡 Game Over = Das Spiel ist vorbei! Game = Spiel, over = vorbei. Du benutzt Englisch beim Zocken bereits – unbewusst!"
    }
  },
  {
    emoji: "🏰",
    category: "Fun Fact",
    text: "Wie heißt der berühmte Palast der britischen Königsfamilie in London?",
    answers: ["Windsor Palace", "Buckingham Palace", "London Castle", "Royal House"],
    correct: 1,
    feedback: {
      right: "✅ Perfekt! Buckingham Palace – palace bedeutet Palast. Jährlich besuchen Millionen Touristen dieses Gebäude. 👑",
      wrong: "💡 Es ist der Buckingham Palace! Palace = Palast. Er liegt mitten in London und ist eine der meistbesuchten Sehenswürdigkeiten der Welt."
    }
  }
];

var current = 0;
var score = 0;
var answered = false;

function renderQuestion() {
  answered = false;
  var q = questions[current];
  document.getElementById('qNumber').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('qCategory').textContent = q.category;
  document.getElementById('qEmoji').textContent = q.emoji;
  document.getElementById('qText').textContent = q.text;

  var pct = (current / questions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = 'Frage ' + (current + 1) + ' von ' + questions.length;

  var letters = ['A', 'B', 'C', 'D'];
  var container = document.getElementById('answersContainer');
  container.innerHTML = '';
  q.answers.forEach(function(ans, i) {
    var btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = '<span class="letter">' + letters[i] + '</span>' + ans;
    btn.onclick = (function(idx) { return function() { selectAnswer(idx); }; })(i);
    container.appendChild(btn);
  });

  var fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('nextBtn').className = 'next-btn';

  var card = document.getElementById('questionCard');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = '';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;
  var q = questions[current];
  var btns = document.querySelectorAll('.answer-btn');
  btns.forEach(function(b) { b.disabled = true; });

  var fb = document.getElementById('feedback');
  if (index === q.correct) {
    score++;
    btns[index].classList.add('correct');
    fb.className = 'feedback correct-fb';
    fb.innerHTML = q.feedback.right;
  } else {
    btns[index].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = q.feedback.wrong;
  }
  document.getElementById('nextBtn').className = 'next-btn visible';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showScore();
  } else {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function showScore() {
  document.getElementById('questionCard').style.display = 'none';
  var screen = document.getElementById('scoreScreen');
  screen.classList.add('visible');

  var pct = score / questions.length;
  document.getElementById('scoreNumber').textContent = score;
  document.getElementById('scoreOf').textContent = 'von ' + questions.length + ' Punkten';

  var emoji, title, stars, msg;
  if (pct >= 0.9) {
    emoji = '🏆'; title = 'Amazing!'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Wow – du bist ein echter English Star! Du weißt schon eine Menge. Der Unterricht wird dir Spaß machen! 🚀';
  } else if (pct >= 0.7) {
    emoji = '🎉'; title = 'Great job!'; stars = '⭐⭐⭐⭐';
    msg = 'Richtig gut! Du hast schon viel Wissen. Im Unterricht wirst du noch viel mehr entdecken! 💪';
  } else if (pct >= 0.5) {
    emoji = '😊'; title = 'Well done!'; stars = '⭐⭐⭐';
    msg = 'Super gemacht! Du hast einiges gewusst – und das Beste: Im Englischunterricht lernst du alles andere noch! 📚';
  } else {
    emoji = '🌱'; title = 'Good start!'; stars = '⭐⭐';
    msg = 'Ein toller Anfang! Alles, was du noch nicht wusstest, lernst du jetzt im Unterricht. Das macht Spaß – versprochen! 😄';
  }

  document.getElementById('scoreEmoji').textContent = emoji;
  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreStars').textContent = stars;
  document.getElementById('scoreMsg').textContent = msg;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = 'Fertig! 🎉';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartQuiz() {
  current = 0;
  score = 0;
  document.getElementById('scoreScreen').classList.remove('visible');
  document.getElementById('questionCard').style.display = 'block';
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

var qrGenerated = false;
function openQR() {
  document.getElementById('qrModal').classList.add('open');
  if (!qrGenerated) {
    new QRCode(document.getElementById('qrcode'), {
      text: window.location.href,
      width: 180,
      height: 180,
      colorDark: '#2d5a9e',
      colorLight: '#ffffff'
    });
    qrGenerated = true;
  }
}
function closeQR(e) {
  if (!e || e.target === document.getElementById('qrModal')) {
    document.getElementById('qrModal').classList.remove('open');
  }
}

renderQuestion();
</script>

</body>
</html>
