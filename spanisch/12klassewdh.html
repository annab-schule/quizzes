}

}

  font-size: 0.8rem;

}

  color: #5a6a8a;

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbzgWj2IjKn9LjcNIB5YMLFVCWITBSQWf7vXZnNfPqlBTE7zqMcFrLNjrrAcKGqwuodZpA/exec";

const questions = [
  // 🥇 ABSOLUT GRUNDLEGEND
  {
    cat: "Verben: -ar / -er / -ir",
    text: 'María _____ en Madrid.',
    options: ["vives", "vive", "vivemos", "viven"],
    correct: 1,
    feedback: "¡Correcto! „vive" – 3. Person Singular von „vivir" (él/ella/usted)."
  },
  {
    cat: "Ser vs. estar",
    text: 'Mi hermano _____ enfermo hoy.',
    options: ["es", "somos", "está", "estamos"],
    correct: 2,
    feedback: "„estar" für vorübergehende Zustände wie Krankheit. „Es" wäre für dauerhafte Eigenschaften."
  },
  {
    cat: "Subjektpronomen",
    text: '_____ hablamos español en clase.',
    options: ["Yo", "Tú", "Él", "Nosotros"],
    correct: 3,
    feedback: "„Nosotros" = wir → „hablamos" (1. Person Plural). Passt perfekt zusammen!"
  },
  {
    cat: "Verneinung mit no",
    text: '¿Cómo se dice richtig: „Ich esse kein Fleisch"?',
    options: ["Como no carne.", "No como carne.", "Como carne no.", "No carne como."],
    correct: 1,
    feedback: "Im Spanischen steht „no" direkt vor dem Verb: <em>No como carne.</em>"
  },
  {
    cat: "Artikel",
    text: 'Tengo _____ libro de español en mi mochila.',
    options: ["un", "una", "unos", "el"],
    correct: 0,
    feedback: "„libro" ist maskulin → unbestimmter Artikel „un". „Una" wäre für feminine Nomen."
  },
  {
    cat: "Adjektive & Stellung",
    text: 'Mi amiga tiene el pelo _____.',
    options: ["rubio largo", "largo rubio", "rubia larga", "largas rubias"],
    correct: 0,
    feedback: "Adjektive stehen im Spanischen meist nach dem Nomen und richten sich nach Genus/Numerus. „pelo" ist maskulin singular."
  },

  // 🥈 SEHR HÄUFIG
  {
    cat: "gustar + Infinitiv",
    text: 'A mí _____ mucho bailar salsa.',
    options: ["gusto", "gustas", "gusta", "gustan"],
    correct: 2,
    feedback: "Bei „gustar" richtet sich das Verb nach dem, was gefällt – hier „bailar" (Infinitiv, Singular) → „gusta"."
  },
  {
    cat: "ir a + Infinitivo",
    text: 'Esta tarde nosotros _____ al cine.',
    options: ["vamos ir", "vamos a ir", "iremos a", "van ir"],
    correct: 1,
    feedback: "<em>ir a + Infinitiv</em> drückt nahe Zukunft aus: „vamos a ir" = wir werden gehen."
  },
  {
    cat: "Gruppenverben e → ie",
    text: '¿A qué hora _____ (empezar) las clases?',
    options: ["empezamos", "empieza", "empeza", "empiezamos"],
    correct: 1,
    feedback: "„empezar" ist ein Gruppenverb e→ie. 3. Person Plural: <em>empiezan</em> – hier: las clases → „empiezan". Aber als Singular-Form: „empieza"."
  },
  {
    cat: "Gruppenverben o → ue",
    text: 'Mis abuelos _____ (dormir) la siesta todos los días.',
    options: ["dormen", "duerme", "duermen", "dormien"],
    correct: 2,
    feedback: "„dormir" → o wird zu ue in betonten Formen. 3. Person Plural: <em>duermen</em>. „dormen" gibt es nicht!"
  },
  {
    cat: "Reflexive Verben",
    text: 'Por la mañana yo _____ (levantarse) a las siete.',
    options: ["levanto me", "me levanto", "me levanta", "levántome"],
    correct: 1,
    feedback: "Reflexivpronomen steht vor dem konjugierten Verb: <em>me levanto</em>. Die Wortstellung „levanto me" ist falsch."
  },
  {
    cat: "Direkte Objektpronomen",
    text: '¿Ves a Juan? – Sí, _____ veo todos los días.',
    options: ["la", "le", "lo", "les"],
    correct: 2,
    feedback: "Juan ist maskulin → direktes Objektpronomen: <em>lo</em>. „le" wäre indirektes Objektpronomen."
  },
  {
    cat: "Possessivbegleiter",
    text: '_____ padres viven en Sevilla. (meine Eltern)',
    options: ["Mi", "Mis", "Mío", "Míos"],
    correct: 1,
    feedback: "„padres" ist Plural → Possessivbegleiter im Plural: <em>Mis</em> padres."
  },

  // 🥉 FLÜSSIGERE KOMMUNIKATION
  {
    cat: "Pretérito indefinido",
    text: 'El fin de semana pasado yo _____ (comer) en un restaurante mexicano.',
    options: ["como", "comí", "comió", "coma"],
    correct: 1,
    feedback: "<em>comí</em> = 1. Person Singular im Pretérito indefinido. „comió" wäre 3. Person (él/ella)."
  },
  {
    cat: "Imperativo",
    text: '_____ (escuchar, tú) la música – ¡es muy buena!',
    options: ["Escuchas", "Escucha", "Escuchen", "Escuchad"],
    correct: 1,
    feedback: "Imperativ für „tú" bei -ar-Verben: einfach 3. Person Singular Präsens → <em>escucha</em>."
  },
  {
    cat: "estar + Gerundio",
    text: 'Ahora mismo mis amigos _____ fútbol en el parque.',
    options: ["están jugando", "están jugar", "están jugado", "son jugando"],
    correct: 0,
    feedback: "<em>estar + Gerundio</em> = etwas passiert gerade. Gerundio von „jugar" = <em>jugando</em>. Immer „estar", nie „ser"!"
  },
  {
    cat: "Kontraktionen del / al",
    text: 'Voy _____ médico por la tarde.',
    options: ["a el", "al", "del", "de el"],
    correct: 1,
    feedback: "<em>a + el</em> wird immer zu <em>al</em> zusammengezogen. „a el" ist grammatisch falsch."
  },
  {
    cat: "Komparativ",
    text: 'Mi hermano es _____ alto _____ yo.',
    options: ["más … que", "más … de", "muy … que", "tan … que"],
    correct: 0,
    feedback: "Komparativ der Überlegenheit: <em>más … que</em>. „de" steht nur vor Zahlen: „más de diez"."
  },

  // 💪 BASISVERBEN
  {
    cat: "Basisverben",
    text: 'Yo _____ dos hermanas y un hermano.',
    options: ["soy", "estoy", "tengo", "hago"],
    correct: 2,
    feedback: "„tener" = haben → 1. Person Singular: <em>tengo</em>. Nicht mit „ser/estar" verwechseln!"
  },
  {
    cat: "Basisverben",
    text: 'Los sábados nosotros _____ deporte juntos.',
    options: ["tenemos", "hacemos", "vamos", "somos"],
    correct: 1,
    feedback: "<em>hacer deporte</em> = Sport machen. „hacemos" = 1. Person Plural von „hacer"."
  },
  {
    cat: "Basisverben",
    text: '¿Adónde _____ tú después de las clases?',
    options: ["haces", "tienes", "eres", "vas"],
    correct: 3,
    feedback: "„ir" = gehen/fahren. 2. Person Singular: <em>vas</em>. Mit „¿adónde?" fragt man nach dem Ziel."
  },
  {
    cat: "Basisverben",
    text: 'Mi madre _____ aprender inglés este año.',
    options: ["puede", "quiere", "sabe", "tiene"],
    correct: 1,
    feedback: "<em>querer + Infinitiv</em> = wollen. „Mi madre quiere aprender…" = Meine Mutter will lernen…"
  },
  {
    cat: "Basisverben",
    text: '¿_____ (vosotros) venir a mi fiesta el sábado?',
    options: ["Queréis", "Sabéis", "Podéis", "Tenéis"],
    correct: 2,
    feedback: "<em>poder</em> = können. Vosotros-Form: <em>podéis</em>. Typisch für Einladungen: „¿Podéis venir?"."
  },

  // 🏠 WICHTIGE SUBSTANTIVE
  {
    cat: "Wortschatz: Substantive",
    text: 'Mi _____ es muy grande – tenemos seis personas en casa.',
    options: ["ciudad", "familia", "semana", "lengua"],
    correct: 1,
    feedback: "<em>la familia</em> = die Familie. Eines der wichtigsten Wörter im Spanischen!"
  },
  {
    cat: "Wortschatz: Substantive",
    text: 'Por las mañanas voy al _____ en autobús.',
    options: ["mercado", "hospital", "colegio", "aeropuerto"],
    correct: 2,
    feedback: "<em>el colegio</em> = die Schule (in Spanien oft für weiterführende Schule). „la escuela" auch möglich."
  },
  {
    cat: "Wortschatz: Substantive",
    text: 'En España la _____ principal del día es al mediodía.',
    options: ["música", "ropa", "comida", "tarde"],
    correct: 2,
    feedback: "<em>la comida</em> = das Essen, die Mahlzeit. In Spanien ist das Mittagessen die Hauptmahlzeit."
  },
  {
    cat: "Wortschatz: Substantive",
    text: 'Los fines de semana tengo mucho _____ para mis hobbies.',
    options: ["trabajo", "tiempo libre", "deberes", "dinero"],
    correct: 1,
    feedback: "<em>el tiempo libre</em> = die Freizeit. Wichtiger Ausdruck für Alltagsgespräche."
  },
  {
    cat: "Wortschatz: Substantive",
    text: 'Mi mejor _____ se llama Lucía y vive cerca de mi casa.',
    options: ["profesora", "vecino", "amiga", "hermano"],
    correct: 2,
    feedback: "<em>la amiga</em> = die Freundin. „mejor amiga" = beste Freundin. Feminin wegen „Lucía"."
  },

  // 🎨 ADJEKTIVE
  {
    cat: "Wortschatz: Adjektive & Farben",
    text: 'La camiseta de mi hermano es _____ y su mochila es _____.',
    options: ["rojo … negro", "roja … negra", "rojas … negros", "rojo … negra"],
    correct: 1,
    feedback: "„camiseta" (f) → <em>roja</em>; „mochila" (f) → <em>negra</em>. Adjektive richten sich nach Genus!"
  },
  {
    cat: "Wortschatz: Adjektive & Charakter",
    text: 'Mi mejor amigo es muy _____ – siempre ayuda a todos.',
    options: ["simpático", "aburrido", "antipático", "perezoso"],
    correct: 0,
    feedback: "<em>simpático</em> = nett, freundlich. „siempre ayuda a todos" (hilft immer allen) passt perfekt dazu."
  }
];

let current = 0;
let score = 0;
let wrongList = [];
let userName = "";
let answered = false;
let qrGenerated = false;

function startQuiz() {
  const n = document.getElementById("nameInput").value.trim();
  if (!n) { document.getElementById("nameInput").focus(); return; }
  userName = n;
  showScreen("quizScreen");
  updateProgress();
  showQuestion();
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function updateProgress() {
  const pct = (current / questions.length) * 100;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent =
    current < questions.length ? `Frage ${current + 1} von ${questions.length}` : "";
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById("qCategory").textContent = q.cat;

  // Highlight blank
  const text = q.text.replace(/_+/g, '<em>_____</em>');
  document.getElementById("qText").innerHTML = text;

  const wrap = document.getElementById("optionsWrap");
  wrap.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `<span class="badge">${labels[i]}</span> ${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    wrap.appendChild(btn);
  });

  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.textContent = "";
  const nb = document.getElementById("nextBtn");
  nb.className = "next-btn";

  // Scroll to card
  document.getElementById("questionCard").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function selectAnswer(i, btn) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const opts = document.querySelectorAll(".option");
  opts.forEach(o => o.classList.add("disabled"));

  const fb = document.getElementById("feedback");
  if (i === q.correct) {
    score++;
    btn.classList.add("correct");
    fb.className = "feedback ok show";
    fb.innerHTML = "✅ " + q.feedback;
  } else {
    btn.classList.add("wrong");
    opts[q.correct].classList.add("correct");
    fb.className = "feedback nope show";
    fb.innerHTML = "❌ " + q.feedback;
    wrongList.push(`F${current + 1}: ${q.text.replace(/_+/g,"_")} → ${q.options[q.correct]}`);
  }

  const nb = document.getElementById("nextBtn");
  nb.className = "next-btn show";
  nb.textContent = current < questions.length - 1 ? "Weiter →" : "Ergebnis anzeigen →";
}

function nextQuestion() {
  current++;
  updateProgress();
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  showScreen("resultScreen");
  document.getElementById("progressBar").style.width = "100%";
  document.getElementById("progressLabel").textContent = "";

  const pct = Math.round((score / questions.length) * 100);
  document.getElementById("resultName").textContent = userName;
  document.getElementById("resultScore").textContent = score;
  document.getElementById("resultTotal").textContent = `von ${questions.length} Fragen richtig (${pct}%)`;

  setTimeout(() => {
    document.getElementById("resultBar").style.width = pct + "%";
  }, 100);

  let emoji, msg;
  if (pct >= 90) {
    emoji = "🌟"; msg = "¡Excelente! Du hast das Quiz fast perfekt gemeistert. Dein Spanisch ist wirklich stark!";
  } else if (pct >= 70) {
    emoji = "😊"; msg = "¡Muy bien! Du kennst schon viel. Mit etwas Wiederholung wirst du noch sicherer.";
  } else if (pct >= 50) {
    emoji = "💪"; msg = "¡Buen intento! Du bist auf dem richtigen Weg – übe die markierten Themen noch einmal.";
  } else {
    emoji = "📚"; msg = "No pasa nada – jeder fängt klein an! Schau dir die Grammatik nochmal an und versuch es erneut.";
  }

  document.getElementById("resultEmoji").textContent = emoji;
  document.getElementById("resultMsg").textContent = msg;

  sendToSheet(pct);
}

function sendToSheet(pct) {
  const msg = document.getElementById("sendingMsg");
  msg.textContent = "⏳ Ergebnis wird übermittelt…";

  const payload = {
    name: userName,
    score: score,
    total: questions.length,
    wrong: wrongList
  };

  fetch(SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  }).then(() => {
    msg.textContent = "✅ Ergebnis wurde gespeichert.";
  }).catch(() => {
    msg.textContent = "⚠️ Übermittlung fehlgeschlagen – kein Internetzugang?";
  });
}

function resetQuiz() {
  current = 0;
  score = 0;
  wrongList = [];
  answered = false;
  updateProgress();
  showScreen("nameScreen");
  document.getElementById("nameInput").value = "";
}

function toggleQR() {
  const modal = document.getElementById("qrModal");
  modal.classList.toggle("open");
  if (!qrGenerated) {
    new QRCode(document.getElementById("qrcode"), {
      text: window.location.href,
      width: 200,
      height: 200,
      colorDark: "#2d5a9e",
      colorLight: "#ffffff"
    });
    qrGenerated = true;
  }
}
</script>
