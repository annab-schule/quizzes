<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="quiz-meta" content="Klasse 12 · Spanisch Grammatik & Wortschatz">
<title>Spanisch-Quiz – Klasse 12</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4ff;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:#1a1a2e;min-height:100vh}
.topbar{background:#2d5a9e;color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(45,90,158,0.3)}
.topbar h1{font-family:Palatino,Georgia,serif;font-size:1.15rem;font-weight:normal}
.qr-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.95rem}
.qr-btn:hover{background:rgba(255,255,255,0.35)}
.prog-wrap{background:#d0d9f0;height:6px}
.prog-bar{background:#2d5a9e;height:6px;width:0%;transition:width 0.4s ease}
.prog-label{text-align:center;font-size:0.8rem;color:#5a6a8a;padding:5px 0}
.screen{display:none}
.screen.active{display:block}
.name-box{max-width:460px;margin:60px auto;padding:40px;background:white;border-radius:16px;box-shadow:0 4px 24px rgba(45,90,158,0.1);text-align:center}
.name-box .flag{font-size:2.8rem;margin-bottom:14px}
.name-box h2{font-family:Palatino,Georgia,serif;font-size:1.8rem;color:#2d5a9e;margin-bottom:8px}
.name-box p{color:#5a6a8a;font-size:0.93rem;margin-bottom:24px;line-height:1.5}
.name-box input{width:100%;padding:12px 16px;border:2px solid #d0d9f0;border-radius:10px;font-size:1.05rem;outline:none;font-family:inherit;transition:border-color 0.2s}
.name-box input:focus{border-color:#2d5a9e}
.start-btn{margin-top:14px;width:100%;padding:13px;background:#2d5a9e;color:white;border:none;border-radius:10px;font-size:1.05rem;cursor:pointer;font-family:inherit}
.start-btn:hover{background:#1e4080}
.quiz-wrap{max-width:600px;margin:0 auto;padding:20px 18px 60px}
.q-card{background:white;border-radius:16px;padding:26px;box-shadow:0 3px 16px rgba(45,90,158,0.09);margin-top:18px}
.q-cat{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:#2d5a9e;font-weight:700;margin-bottom:10px}
.q-text{font-size:1.08rem;line-height:1.65;font-family:Palatino,Georgia,serif;margin-bottom:20px}
.q-text em{font-style:normal;background:#eef2ff;padding:1px 6px;border-radius:4px;color:#2d5a9e;font-weight:700}
.options{display:flex;flex-direction:column;gap:9px}
.opt{padding:11px 15px;border:2px solid #d0d9f0;border-radius:10px;cursor:pointer;font-size:0.96rem;background:#f8f9ff;display:flex;align-items:center;gap:11px;text-align:left;width:100%;font-family:inherit;transition:border-color 0.15s,background 0.15s}
.opt:hover{border-color:#2d5a9e;background:#eef2ff}
.opt.disabled{cursor:default;pointer-events:none}
.badge{min-width:26px;height:26px;border-radius:50%;background:#d0d9f0;color:#2d5a9e;font-weight:700;font-size:0.78rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.opt.correct{border-color:#22c55e;background:#f0fdf4}
.opt.correct .badge{background:#22c55e;color:white}
.opt.wrong{border-color:#ef4444;background:#fff5f5}
.opt.wrong .badge{background:#ef4444;color:white}
.feedback{margin-top:16px;padding:13px 15px;border-radius:10px;font-size:0.91rem;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.ok{background:#f0fdf4;border-left:4px solid #22c55e;color:#166534}
.feedback.nope{background:#fff5f5;border-left:4px solid #ef4444;color:#991b1b}
.next-btn{margin-top:16px;padding:11px 28px;background:#2d5a9e;color:white;border:none;border-radius:10px;font-size:0.96rem;cursor:pointer;font-family:inherit;display:none}
.next-btn:hover{background:#1e4080}
.next-btn.show{display:inline-block}
.result-box{max-width:500px;margin:50px auto;padding:38px;background:white;border-radius:20px;box-shadow:0 4px 32px rgba(45,90,158,0.12);text-align:center}
.res-emoji{font-size:3.2rem;margin-bottom:10px}
.res-name{font-size:0.95rem;color:#5a6a8a;margin-bottom:4px}
.res-score{font-family:Palatino,Georgia,serif;font-size:3rem;color:#2d5a9e;font-weight:bold;line-height:1}
.res-total{font-size:0.95rem;color:#5a6a8a;margin-bottom:14px}
.res-bar-wrap{background:#d0d9f0;border-radius:99px;height:11px;margin:0 0 22px;overflow:hidden}
.res-bar{background:#2d5a9e;height:11px;border-radius:99px;width:0%;transition:width 1s ease}
.res-msg{font-size:1rem;color:#1a1a2e;margin-bottom:24px;line-height:1.6}
.again-btn{padding:12px 32px;background:#2d5a9e;color:white;border:none;border-radius:10px;font-size:1rem;cursor:pointer;font-family:inherit}
.again-btn:hover{background:#1e4080}
.send-msg{font-size:0.8rem;color:#5a6a8a;margin-top:14px}
.qr-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center}
.qr-overlay.open{display:flex}
.qr-box{background:white;border-radius:16px;padding:30px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.qr-box p{margin-top:14px;font-size:0.86rem;color:#5a6a8a}
.qr-close{margin-top:14px;padding:8px 22px;background:#2d5a9e;color:white;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="topbar">
  <h1>🇪🇸 Spanisch-Quiz · Klasse 12</h1>
  <button class="qr-btn" id="qrBtn">⊞ QR-Code</button>
</div>
<div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
<div class="prog-label" id="progLabel"></div>

<div class="screen active" id="nameScreen">
  <div class="name-box">
    <div class="flag">🇪🇸</div>
    <h2>¡Bienvenido/a!</h2>
    <p>Trag deinen Namen ein und starte das Quiz.<br>30 Fragen zu Grammatik und Wortschatz.</p>
    <input type="text" id="nameInput" placeholder="Dein Name..." maxlength="40">
    <button class="start-btn" id="startBtn">Los geht's →</button>
  </div>
</div>

<div class="screen" id="quizScreen">
  <div class="quiz-wrap">
    <div class="q-card">
      <div class="q-cat" id="qCat"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="opts"></div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn">Weiter →</button>
    </div>
  </div>
</div>

<div class="screen" id="resultScreen">
  <div class="result-box">
    <div class="res-emoji" id="resEmoji"></div>
    <div class="res-name" id="resName"></div>
    <div class="res-score" id="resScore"></div>
    <div class="res-total" id="resTotal"></div>
    <div class="res-bar-wrap"><div class="res-bar" id="resBar"></div></div>
    <div class="res-msg" id="resMsg"></div>
    <button class="again-btn" id="againBtn">🔄 Nochmal versuchen</button>
    <div class="send-msg" id="sendMsg"></div>
  </div>
</div>

<div class="qr-overlay" id="qrOverlay">
  <div class="qr-box">
    <div id="qrcode"></div>
    <p>Scanne den QR-Code,<br>um das Quiz zu öffnen.</p>
    <button class="qr-close" id="qrClose">Schließen</button>
  </div>
</div>

<script>
var SHEET_URL = "https://script.google.com/macros/s/AKfycbzgWj2IjKn9LjcNIB5YMLFVCWITBSQWf7vXZnNfPqlBTE7zqMcFrLNjrrAcKGqwuodZpA/exec";

var Q = [
  {cat:"Verben -ar/-er/-ir",text:"María _____ en Madrid.",opts:["vives","vive","vivemos","viven"],c:1,fb:"vive ist die 3. Person Singular von vivir (él/ella/usted)."},
  {cat:"Ser vs. estar",text:"Mi hermano _____ enfermo hoy.",opts:["es","somos","está","estamos"],c:2,fb:"estar für vorübergehende Zustände wie Krankheit. ser wäre für dauerhafte Eigenschaften."},
  {cat:"Subjektpronomen",text:"_____ hablamos español en clase.",opts:["Yo","Tú","Él","Nosotros"],c:3,fb:"Nosotros = wir → hablamos (1. Person Plural)."},
  {cat:"Verneinung mit no",text:"Wie sagt man: Ich esse kein Fleisch?",opts:["Como no carne.","No como carne.","Como carne no.","No carne como."],c:1,fb:"no steht direkt vor dem Verb: No como carne."},
  {cat:"Artikel",text:"Tengo _____ libro de español en mi mochila.",opts:["un","una","unos","el"],c:0,fb:"libro ist maskulin → unbestimmter Artikel un."},
  {cat:"Adjektive & Stellung",text:"Mi amiga tiene el pelo _____.",opts:["rubio largo","largo rubio","rubia larga","largas rubias"],c:0,fb:"Adjektive stehen meist nach dem Nomen. pelo ist maskulin singular → rubio largo."},
  {cat:"gustar + Infinitiv",text:"A mí _____ mucho bailar salsa.",opts:["yo gusto","gustas","me gusta","me gustan"],c:2,fb:"Bei gustar richtet sich das Verb nach dem, was gefällt – hier bailar → gusta."},
  {cat:"ir a + Infinitivo",text:"Esta tarde nosotros _____ al cine.",opts:["vamos ir","vamos a ir","iremos a","van ir"],c:1,fb:"ir a + Infinitiv drückt nahe Zukunft aus: vamos a ir = wir werden gehen."},
  {cat:"Gruppenverben e→ie",text:"¿A qué hora _____ (empezar) las clases?",opts:["empezamos","empiezan","empeza","empiezamos"],c:1,fb:"empezar ist ein Gruppenverb e→ie. 3. Person Plural: empiezan."},
  {cat:"Gruppenverben o→ue",text:"Mis abuelos _____ (dormir) la siesta todos los días.",opts:["dormen","duerme","duermen","dormien"],c:2,fb:"dormir → o wird zu ue. 3. Person Plural: duermen."},
  {cat:"Reflexive Verben",text:"Por la mañana yo _____ (levantarse) a las siete.",opts:["levanto me","me levanto","me levanta","levántome"],c:1,fb:"Reflexivpronomen steht vor dem konjugierten Verb: me levanto."},
  {cat:"Direkte Objektpronomen",text:"¿Ves a Juan? – Sí, _____ veo todos los días.",opts:["la","le","lo","les"],c:2,fb:"Juan ist maskulin → direktes Objektpronomen: lo."},
  {cat:"Possessivbegleiter",text:"_____ padres viven en Sevilla. (meine Eltern)",opts:["Mi","Mis","Mío","Míos"],c:1,fb:"padres ist Plural → Mis padres."},
  {cat:"Pretérito indefinido",text:"El fin de semana pasado yo _____ (comer) en un restaurante.",opts:["como","comí","comió","coma"],c:1,fb:"comí = 1. Person Singular Pretérito indefinido."},
  {cat:"Imperativo",text:"_____ (escuchar, tú) la música – ¡es muy buena!",opts:["Escuchas","Escucha","Escuchen","Escuchad"],c:1,fb:"Imperativ tú bei -ar-Verben: 3. Person Singular Präsens → escucha."},
  {cat:"estar + Gerundio",text:"Ahora mismo mis amigos _____ fútbol en el parque.",opts:["están jugando","están jugar","están jugado","son jugando"],c:0,fb:"estar + Gerundio = etwas passiert gerade. jugando = Gerundio von jugar."},
  {cat:"Kontraktionen del/al",text:"Voy _____ médico por la tarde.",opts:["a el","al","del","de el"],c:1,fb:"a + el wird immer zu al zusammengezogen."},
  {cat:"Komparativ",text:"Mi hermano es _____ alto _____ yo.",opts:["más … que","más … de","muy … que","tan … que"],c:0,fb:"Komparativ der Überlegenheit: más … que."},
  {cat:"Basisverben",text:"Yo _____ dos hermanas y un hermano.",opts:["soy","estoy","tengo","hago"],c:2,fb:"tener = haben → 1. Person Singular: tengo."},
  {cat:"Basisverben",text:"Los sábados nosotros _____ deporte juntos.",opts:["tenemos","hacemos","vamos","somos"],c:1,fb:"hacer deporte = Sport machen. hacemos = wir machen."},
  {cat:"Basisverben",text:"¿Adónde _____ tú después de las clases?",opts:["haces","tienes","eres","vas"],c:3,fb:"ir = gehen/fahren. 2. Person Singular: vas."},
  {cat:"Basisverben",text:"Mi madre _____ aprender inglés este año.",opts:["puede","quiere","sabe","tiene"],c:1,fb:"querer + Infinitiv = wollen."},
  {cat:"Basisverben",text:"¿_____ (vosotros) venir a mi fiesta el sábado?",opts:["Queréis","Sabéis","Podéis","Tenéis"],c:2,fb:"poder = können. Vosotros-Form: Podéis."},
  {cat:"Substantive",text:"Mi _____ es muy grande – tenemos seis personas en casa.",opts:["ciudad","familia","semana","lengua"],c:1,fb:"la familia = die Familie."},
  {cat:"Substantive",text:"Por las mañanas voy al _____ en autobús.",opts:["mercado","hospital","colegio","aeropuerto"],c:2,fb:"el colegio = die Schule."},
  {cat:"Substantive",text:"En España la _____ principal del día es al mediodía.",opts:["música","ropa","comida","tarde"],c:2,fb:"la comida = das Essen / die Mahlzeit."},
  {cat:"Substantive",text:"Los fines de semana tengo mucho _____ para mis hobbies.",opts:["trabajo","tiempo libre","deberes","dinero"],c:1,fb:"el tiempo libre = die Freizeit."},
  {cat:"Substantive",text:"Mi mejor _____ se llama Lucía y vive cerca de mi casa.",opts:["profesora","vecino","amiga","hermano"],c:2,fb:"la amiga = die Freundin. Feminin wegen Lucía."},
  {cat:"Adjektive & Farben",text:"La camiseta es _____ y la mochila es _____.",opts:["rojo … negro","roja … negra","rojas … negros","rojo … negra"],c:1,fb:"camiseta (f) → roja; mochila (f) → negra. Adjektive nach Genus!"},
  {cat:"Adjektive & Charakter",text:"Mi mejor amigo es muy _____ – siempre ayuda a todos.",opts:["simpático","aburrido","antipático","perezoso"],c:0,fb:"simpático = nett, freundlich."}
];

var cur=0, sc=0, wrong=[], name="", done=false, qrMade=false;
var LBL=["A","B","C","D"];

function go(id){
  ["nameScreen","quizScreen","resultScreen"].forEach(function(s){
    var el=document.getElementById(s);
    el.style.display=(s===id)?"block":"none";
    el.className="screen"+(s===id?" active":"");
  });
}

function setBar(n){
  var p=Math.round(n/Q.length*100);
  document.getElementById("progBar").style.width=p+"%";
  document.getElementById("progLabel").textContent=n<Q.length?"Frage "+(n+1)+" von "+Q.length:"";
}

function showQ(){
  done=false;
  var q=Q[cur];
  document.getElementById("qCat").textContent=q.cat;
  document.getElementById("qText").innerHTML=q.text.replace(/_{3,}/g,'<em>_____</em>');
  var w=document.getElementById("opts");
  w.innerHTML="";
  q.opts.forEach(function(o,i){
    var b=document.createElement("button");
    b.className="opt";
    b.dataset.i=i;
    b.innerHTML='<span class="badge">'+LBL[i]+'</span>'+o;
    w.appendChild(b);
  });
  document.getElementById("feedback").className="feedback";
  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").className="next-btn";
}

function pick(i){
  if(done)return;
  done=true;
  var q=Q[cur];
  document.querySelectorAll(".opt").forEach(function(b){b.classList.add("disabled");});
  var clicked=document.querySelector('.opt[data-i="'+i+'"]');
  var fb=document.getElementById("feedback");
  if(i===q.c){
    sc++;
    clicked.classList.add("correct");
    fb.className="feedback ok show";
    fb.textContent="✅ "+q.fb;
  } else {
    clicked.classList.add("wrong");
    document.querySelector('.opt[data-i="'+q.c+'"]').classList.add("correct");
    fb.className="feedback nope show";
    fb.textContent="❌ "+q.fb;
    wrong.push("F"+(cur+1)+": "+q.text+" → "+q.opts[q.c]);
  }
  var nb=document.getElementById("nextBtn");
  nb.className="next-btn show";
  nb.textContent=cur<Q.length-1?"Weiter →":"Ergebnis anzeigen →";
}

function showResult(){
  go("resultScreen");
  document.getElementById("progBar").style.width="100%";
  document.getElementById("progLabel").textContent="";
  var pct=Math.round(sc/Q.length*100);
  document.getElementById("resEmoji").textContent=pct>=90?"🌟":pct>=70?"😊":pct>=50?"💪":"📚";
  document.getElementById("resName").textContent=name;
  document.getElementById("resScore").textContent=sc;
  document.getElementById("resTotal").textContent="von "+Q.length+" Fragen richtig ("+pct+"%)";
  document.getElementById("resMsg").textContent=
    pct>=90?"¡Excelente! Du hast das Quiz fast perfekt gemeistert!":
    pct>=70?"¡Muy bien! Mit etwas Wiederholung wirst du noch sicherer.":
    pct>=50?"¡Buen intento! Übe die markierten Themen noch einmal.":
    "No pasa nada – schau dir die Grammatik nochmal an und versuch es erneut!";
  setTimeout(function(){document.getElementById("resBar").style.width=pct+"%";},150);
  var msg=document.getElementById("sendMsg");
  msg.textContent="⏳ Ergebnis wird übermittelt…";
  fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:name,score:sc,total:Q.length,wrong:wrong})})
    .then(function(){msg.textContent="✅ Ergebnis gespeichert.";})
    .catch(function(){msg.textContent="⚠️ Übermittlung fehlgeschlagen.";});
}

window.addEventListener("DOMContentLoaded",function(){
  go("nameScreen");

  document.getElementById("startBtn").addEventListener("click",function(){
    var n=document.getElementById("nameInput").value.trim();
    if(!n){document.getElementById("nameInput").focus();return;}
    name=n; go("quizScreen"); setBar(0); showQ();
  });

  document.getElementById("nameInput").addEventListener("keydown",function(e){
    if(e.key==="Enter")document.getElementById("startBtn").click();
  });

  document.getElementById("opts").addEventListener("click",function(e){
    var b=e.target.closest(".opt");
    if(b&&!b.classList.contains("disabled"))pick(parseInt(b.dataset.i));
  });

  document.getElementById("nextBtn").addEventListener("click",function(){
    cur++;
    if(cur<Q.length){setBar(cur);showQ();}
    else showResult();
  });

  document.getElementById("againBtn").addEventListener("click",function(){
    cur=0;sc=0;wrong=[];done=false;
    document.getElementById("nameInput").value="";
    setBar(0);
    go("nameScreen");
  });

  document.getElementById("qrBtn").addEventListener("click",function(){
    document.getElementById("qrOverlay").classList.add("open");
    if(!qrMade){
      new QRCode(document.getElementById("qrcode"),{
        text:window.location.href,width:200,height:200,
        colorDark:"#2d5a9e",colorLight:"#ffffff"
      });
      qrMade=true;
    }
  });

  document.getElementById("qrClose").addEventListener("click",function(){
    document.getElementById("qrOverlay").classList.remove("open");
  });

  document.getElementById("qrOverlay").addEventListener("click",function(e){
    if(e.target===this)this.classList.remove("open");
  });
});
</script>

</body>
</html>
